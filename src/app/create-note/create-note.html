<div class="col-md-6 offset-md-3">
    <h3>Create New Note</h3>
    <form (ngSubmit) = "onSubmit()">
        <div class="form-group">
            <label>Title</label>
            <input type="text" class="form-control" id="title" name = "title" [(ngModel)] = "note.title">
        </div>
        <div class="form-group">
            <label>Your Note</label>
            <input type="text" class="form-control" id="content" name = "content" [(ngModel)] = "note.content">
        </div>

        <button class="btn btn-success" type="submit">Submit</button>
    </form>
</div>
